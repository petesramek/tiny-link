name: TinyLink CI

on: [push, pull_request]

jobs:
  test_native:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install PlatformIO
        run: pip install -U platformio

      - name: Run Native Unit Tests
        run: pio test -e native

  compile_check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install PlatformIO
        run: pip install -U platformio

      - name: Verify Build (MH-Tiny88 / AVR)
        run: |
          echo '#include <TinyLink.h>\n#include <adapters/TinyArduinoAdapter.h>\nstruct Data { int x; };\nTinyArduinoAdapter hw(Serial);\nTinyLink<Data, TinyArduinoAdapter> link(hw);\nvoid setup(){} void loop(){ link.update(); }' > verify.cpp
          pio ci --lib="." --board=attiny88 verify.cpp

      - name: Verify Build (ESP-M3 / ESP8266)
        run: |
          echo '#include <TinyLink.h>\n#include <adapters/TinyArduinoAdapter.h>\nstruct Data { int x; };\nTinyArduinoAdapter hw(Serial);\nTinyLink<Data, TinyArduinoAdapter> link(hw);\nvoid setup(){} void loop(){ link.update(); }' > verify_esp.cpp
          pio ci --lib="." --board=esp01_1m verify_esp.cpp

